<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Viju ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@300;400;500&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #090b16, #1c1030, #32163d);
    font-family: 'Inter', sans-serif;
    padding: 16px;
}

.card {
    width: 100%;
    max-width: 400px;
    padding: 22px;
    border-radius: 28px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    text-align: center;
}

img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 22px;
    margin-bottom: 18px;
}

.small {
    color: rgba(255,255,255,0.65);
    font-size: 0.75rem;
    letter-spacing: 3px;
    margin-bottom: 10px;
}

h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    color: white;
    margin-bottom: 16px;
}

p {
    color: rgba(255,255,255,0.88);
    line-height: 1.6;
    font-size: 0.95rem;
    margin-bottom: 22px;
}

button {
    border: none;
    padding: 14px 28px;
    border-radius: 999px;
    background: linear-gradient(135deg, #d4af37, #fff1a8);
    color: #111;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(212,175,55,0.4);
}

button:active {
    transform: scale(0.97);
}
</style>
</head>

<body>

<div class="card">

<img src="Viju.jpg" alt="Memory">

<div class="small">FOR SOMEONE WHO MATTERS ❤️</div>

<h1>Sorry, Viju</h1>

<p>
I’m sorry for everything that has happened 🥺❤️<br><br>
I promise I’ll do everything I can to help you forget the hurt and make our days ahead the happiest ones for both of us 💗✨
</p>

<button onclick="alert('Please forgive me 🥹❤️')">
Forgive Me ✨
</button>

</div>

</body>
</html>
